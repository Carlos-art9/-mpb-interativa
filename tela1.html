<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MPB Interativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary: #3b82f6;
            --color-background: #000000;
            --color-card-bg: #1f2937;
            --color-input-bg: #111827;
        }
        body {
            background-color: var(--color-background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md bg-[var(--color-card-bg)] p-8 rounded-xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-extrabold text-center mb-6 text-white">
            Crie Sua Conta <span class="text-[var(--color-primary)]">MPB</span>
        </h1>
        <form>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-1">Nome Completo</label>
                <input type="text" placeholder="Seu nome" class="w-full p-3 rounded-lg bg-[var(--color-input-bg)] text-white border border-gray-700 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" placeholder="seu@email.com" class="w-full p-3 rounded-lg bg-[var(--color-input-bg)] text-white border border-gray-700 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="button" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition duration-300">
                Cadastrar
            </button>
        </form>
    </div>
</body>
</html>
